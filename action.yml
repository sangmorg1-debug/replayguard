name: ReplayGuard verification
description: Run local AI regression suites and emit a merge-gate evidence bundle
inputs:
  suite:
    description: Path to the ReplayGuard regression suite
    required: true
  candidate-map:
    description: Optional JSON map of case IDs to candidate runs
    required: false
    default: ""
  output-directory:
    description: Directory for reports and the evidence bundle
    required: false
    default: .verify/report
  changed-only:
    description: Select cases associated with changed paths
    required: false
    default: "true"
outputs:
  passed:
    description: Whether every selected case passed
    value: ${{ steps.verify.outputs.passed }}
  evidence-sha256:
    description: SHA-256 identity of the evidence bundle
    value: ${{ steps.verify.outputs.evidence_sha256 }}
  report-path:
    description: Generated Markdown report path
    value: ${{ steps.verify.outputs.report_path }}
runs:
  using: composite
  steps:
    - name: Install ReplayGuard
      shell: bash
      env:
        REPLAYGUARD_ACTION_PATH: ${{ github.action_path }}
      run: python -m pip install "$REPLAYGUARD_ACTION_PATH"
    - name: Verify regression suite
      id: verify
      shell: bash
      env:
        REPLAYGUARD_SUITE: ${{ inputs.suite }}
        REPLAYGUARD_CANDIDATES: ${{ inputs.candidate-map }}
        REPLAYGUARD_OUTPUT: ${{ inputs.output-directory }}
        REPLAYGUARD_CHANGED_ONLY: ${{ inputs.changed-only }}
        REPLAYGUARD_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        REPLAYGUARD_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
      run: bash "$GITHUB_ACTION_PATH/scripts/run-action.sh"

